<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#16213E"/>
<meta name="description" content="Urban ज़ायका - Fresh food delivery in Met City, Haryana. Order online now!"/>
<meta property="og:title" content="Urban ज़ायका"/>
<meta property="og:description" content="Fresh food delivery in Met City, Haryana"/>
<meta property="og:type" content="website"/>
<title>Urban ज़ायका</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" href="/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--red:#F40009;--navy:#16213E;--white:#fff;--bg:#f4f4f4;--card:#fff;--border:#e8e8e8;--muted:#777;--green:#2e7d32;--r:14px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Inter','Noto Sans Devanagari',sans-serif;background:var(--bg);color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
body.hi{font-family:'Noto Sans Devanagari','Inter',sans-serif;}

/* ── HEADER ── */
.hdr{background:var(--navy);padding:13px 16px 11px;position:sticky;top:0;z-index:200;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.logo h1{color:#fff;font-size:20px;font-weight:700;letter-spacing:-.3px;}
.logo h1 span{color:var(--red);}
.logo p{color:#8899bb;font-size:11px;margin-top:2px;}
.lang-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;}
.lang-btn:hover{background:rgba(255,255,255,.2);}

/* ── SEARCH ── */
.search-wrap{background:var(--navy);padding:8px 16px 13px;}
.s-inner{position:relative;}
.s-inp{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:9px 14px 9px 36px;color:#fff;font-size:13px;outline:none;}
.s-inp::placeholder{color:#8899bb;}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#8899bb;font-size:14px;pointer-events:none;}

/* ── BANNER ── */
.banner{background:linear-gradient(130deg,#b50007,var(--red));margin:12px 12px 4px;border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative;}
.banner::before{content:'';position:absolute;right:-10px;top:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.07);}
.bn-sub{color:rgba(255,255,255,.82);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.bn-main{color:#fff;font-size:14px;font-weight:700;margin-top:3px;}
.bn-ico{font-size:34px;position:relative;z-index:1;}

/* ── CATEGORY PILLS ── */
.cat-bar{display:flex;gap:7px;overflow-x:auto;padding:9px 12px 5px;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cpill{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;color:#444;}
.cpill.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}

/* ── SECTION TITLE ── */
.sec-hd{font-size:15px;font-weight:700;padding:13px 16px 7px;color:var(--navy);display:flex;align-items:center;gap:8px;}
.sec-hd::after{content:'';flex:1;height:1.5px;background:var(--border);border-radius:2px;}

/* ── MENU CARD ── */
.mlist{padding:0 12px;display:flex;flex-direction:column;gap:9px;}
.mcard{background:var(--card);border-radius:var(--r);display:flex;align-items:stretch;box-shadow:0 1px 5px rgba(0,0,0,.07);overflow:hidden;position:relative;transition:box-shadow .2s;}
.mcard:active{box-shadow:0 3px 12px rgba(0,0,0,.13);}

/* SVG photo tile */
.ptile{width:96px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ptile svg{width:100%;height:100%;display:block;}

/* Item info */
.minfo{flex:1;padding:10px 12px 10px 9px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.vrow{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.vdot{width:14px;height:14px;border:1.5px solid;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.vdot.v{border-color:var(--green);}.vdot.v::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);}
.vdot.nv{border-color:#c62828;}.vdot.nv::after{content:'';width:7px;height:7px;border-radius:50%;background:#c62828;}
.iname{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idesc{font-size:11px;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
.ifoot{display:flex;align-items:center;justify-content:space-between;}
.iprice{font-size:15px;font-weight:700;color:var(--navy);}
.sold-lbl{font-size:11px;color:#999;font-weight:500;}

.add-btn{background:#fff;border:1.5px solid var(--red);color:var(--red);border-radius:8px;padding:5px 15px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.add-btn:active{background:var(--red);color:#fff;transform:scale(.97);}
.qctrl{display:flex;align-items:center;background:var(--red);border-radius:8px;overflow:hidden;}
.qbtn{background:none;border:none;color:#fff;font-size:16px;font-weight:700;padding:4px 10px;cursor:pointer;line-height:1;}
.qnum{color:#fff;font-size:13px;font-weight:700;min-width:20px;text-align:center;}

.best-badge{position:absolute;top:7px;left:7px;background:rgba(230,81,0,.92);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;z-index:2;}

/* ── CART BAR ── */
.cart-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:var(--navy);border-radius:14px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(22,33,62,.4);z-index:300;cursor:pointer;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.cl{display:flex;align-items:center;gap:10px;}
.ccount{background:var(--red);color:#fff;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.clbl{color:#fff;font-size:13px;font-weight:600;line-height:1.2;}
.clbl span{display:block;font-size:11px;color:#8899bb;font-weight:400;}
.cprice{color:#fff;font-size:16px;font-weight:700;}
.carrow{background:rgba(255,255,255,.1);color:#fff;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}

/* ── CHECKOUT OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:none;align-items:flex-end;}
.overlay.show{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;padding:20px 20px 32px;max-height:92vh;overflow-y:auto;}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sheet-hd h2{font-size:17px;font-weight:700;color:var(--navy);}
.close-btn{background:#f4f4f4;border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Order type toggle */
.otype{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.otype-btn{border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .15s;background:#fff;}
.otype-btn.on{border-color:var(--red);background:#fff5f5;}
.otype-btn .oi{font-size:22px;display:block;margin-bottom:3px;}
.otype-btn .ol{font-size:13px;font-weight:600;color:#444;}
.otype-btn.on .ol{color:var(--red);}

/* GPS / Location */
.gps-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all .2s;}
.gps-btn.detected{border-color:var(--red);background:#fff5f5;color:var(--red);}
.gps-status{font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:12px;display:none;}
.gps-status.ok{background:#e8f5e9;color:#2e7d32;display:block;}
.gps-status.err{background:#fff3e0;color:#e65100;display:block;}
.gps-status.far{background:#fce4ec;color:#c62828;display:block;}

/* Free delivery progress */
.free-bar{background:#fff8e1;border-radius:10px;padding:10px 12px;margin-bottom:14px;display:none;}
.free-bar.show{display:block;}
.free-bar p{font-size:12px;font-weight:600;color:#e65100;margin-bottom:6px;}
.prog-track{background:#ffe082;border-radius:4px;height:5px;overflow:hidden;}
.prog-fill{background:#FF6F00;height:100%;border-radius:4px;transition:width .4s;}

/* Form fields */
.flabel{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block;}
.flabel .req{color:var(--red);}
.finp{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;outline:none;margin-bottom:12px;font-family:inherit;transition:border-color .2s;}
.finp:focus{border-color:var(--red);}
.finp.err-field{border-color:#c62828;}

/* Order summary */
.sum-box{background:#f9f9f9;border-radius:10px;padding:12px;margin-bottom:16px;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.sum-row.total{font-size:15px;font-weight:700;border-top:1.5px solid var(--border);margin-top:6px;padding-top:8px;}
.sum-row.free-del{color:var(--green);font-weight:600;}

.wa-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s;}
.wa-btn:disabled{opacity:.6;cursor:not-allowed;}
.wa-btn:active{opacity:.85;}

/* Cart items in sheet */
.cart-items{margin-bottom:14px;}
.ci-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.ci-row:last-child{border-bottom:none;}
.ci-name{flex:1;font-weight:500;}
.ci-qty{color:var(--muted);margin:0 10px;}
.ci-price{font-weight:600;}

.pb{height:90px;}

/* Loading spinner */
.loading{text-align:center;padding:40px 20px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body id="appBody">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <h1>Urban <span>ज़ायका</span></h1>
      <p id="hdr-sub">Met City, Haryana · Open Now 🟢</p>
    </div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">हिंदी</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="s-inner">
    <span class="s-ico">🔍</span>
    <input class="s-inp" id="srch" placeholder="Search dishes..." oninput="renderMenu()"/>
  </div>
</div>

<!-- BANNER -->
<div class="banner">
  <div>
    <p class="bn-sub" id="bnSub">ORDER ABOVE ₹1000 FOR FREE DELIVERY</p>
    <p class="bn-main" id="bnMain">Fresh food, Fast delivery 🚀</p>
  </div>
  <div class="bn-ico">🍛</div>
</div>

<!-- CATEGORIES -->
<div class="cat-bar" id="catBar"></div>

<!-- MENU -->
<div id="menuWrap">
  <div class="loading"><div class="spinner"></div><p id="loadTxt">Loading menu...</p></div>
</div>

<div class="pb"></div>

<!-- CART BAR -->
<div class="cart-bar" id="cartBar" style="display:none" onclick="openCheckout()">
  <div class="cl">
    <div class="ccount" id="cCount">0</div>
    <div class="clbl" id="cLbl">View Cart<span id="cSub">Tap to place order</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="cprice" id="cPrice">₹0</div>
    <div class="carrow">›</div>
  </div>
</div>

<!-- CHECKOUT OVERLAY -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
<div class="sheet" id="sheet">
  <div class="sheet-hd">
    <h2 id="sheetTitle">Your Order</h2>
    <button class="close-btn" onclick="closeCheckout()">✕</button>
  </div>

  <!-- Order type -->
  <div class="otype">
    <div class="otype-btn" id="btnPickup" onclick="setOtype('pickup')">
      <span class="oi">🚶</span><span class="ol" id="pickupLbl">Pickup</span>
    </div>
    <div class="otype-btn on" id="btnDelivery" onclick="setOtype('delivery')">
      <span class="oi">🛵</span><span class="ol" id="deliveryLbl">Delivery</span>
    </div>
  </div>

  <!-- GPS section (shown only for delivery) -->
  <div id="gpsSection">
    <button class="gps-btn" id="gpsBtn" onclick="detectGPS()">
      <span>📍</span><span id="gpsBtnTxt">Detect My Location</span>
    </button>
    <div class="gps-status" id="gpsStatus"></div>
  </div>

  <!-- Free delivery progress bar -->
  <div class="free-bar" id="freeBar">
    <p id="freeBarTxt">🚚 Add ₹920 more for FREE delivery!</p>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:8%"></div></div>
  </div>

  <!-- Cart items -->
  <div class="cart-items" id="cartItems"></div>

  <!-- Form -->
  <label class="flabel" for="custName"><span id="nameLbl">Your Name</span> <span class="req">*</span></label>
  <input class="finp" id="custName" type="text" placeholder="Enter your full name"/>

  <label class="flabel" for="custPhone"><span id="phoneLbl">Mobile Number</span> <span class="req">*</span></label>
  <input class="finp" id="custPhone" type="tel" placeholder="10-digit mobile number" maxlength="10"/>

  <div id="addrSection">
    <label class="flabel" for="custAddr"><span id="addrLbl">Delivery Address</span></label>
    <textarea class="finp" id="custAddr" rows="2" placeholder="Enter full delivery address" style="resize:none;"></textarea>
  </div>

  <!-- Summary -->
  <div class="sum-box">
    <div class="sum-row"><span id="subLbl">Subtotal</span><span id="sumSub">₹0</span></div>
    <div class="sum-row" id="delRow"><span id="delLbl">Delivery charge</span><span id="sumDel">₹0</span></div>
    <div class="sum-row total"><span id="totalLbl">Total</span><span id="sumTotal">₹0</span></div>
  </div>

  <button class="wa-btn" id="waBtn" onclick="placeOrder()">
    <span>📱</span><span id="waBtnTxt">Order via WhatsApp</span><span id="waBtnPrice"></span>
  </button>
</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,getDocs,query,orderBy}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const FC={
  apiKey:"AIzaSyExample-ReplaceWithYourKey",
  authDomain:"urban-zayka.firebaseapp.com",
  projectId:"urban-zayka",
  storageBucket:"urban-zayka.appspot.com",
  messagingSenderId:"849575139822",
  appId:"1:849575139822:web:01e6d124f8d78267b196ff"
};
const app=initializeApp(FC);
const db=getFirestore(app);
window._db=db;

async function loadMenu(){
  try{
    const snap=await getDocs(collection(db,"menuItems"));
    const items=[];
    snap.forEach(d=>items.push({id:d.id,...d.data()}));
    window._menuData=items;
    window._menuLoaded=true;
    if(window._initDone)window.buildMenu();
  }catch(e){
    console.error(e);
    document.getElementById('loadTxt').textContent='Failed to load menu. Please refresh.';
  }
}
loadMenu();
</script>

let lang = localStorage.getItem('uz_lang') || 'en';
let cart = {};
let activeCat = 'all';
let orderType = 'delivery';

const RESTAURANT_LNG = 76.74672250104636;
const WA_NUMBER = '918860609555';

// ── HELPERS ────────────────────────────────────────────────────────────────
function t(key, vars={}){
  let s = L[lang][key] || key;
  Object.entries(vars).forEach(([k,v])=>{ s=s.replace(`{${k}}`,v); });
  return s;
}
function showToast(msg,dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function deliveryCharge(distKm, subtotal){
  if(subtotal >= FREE_DEL_MIN) return 0;
  if(distKm <= 5) return 50;
  if(distKm <= 10) return 100;
  return -1; // too far
}

function renderCats(){
  const bar = document.getElementById('catBar');
  const allLabel = t('allCat');
  const pills = [{key:'all', icon:'🍽️', label:allLabel}, ...CATS.map(c=>({key:c.key, icon:c.icon, label:lang==='hi'?c.labelHi:c.label}))];
  bar.innerHTML = pills.map(p=>`<div class="cpill${activeCat===p.key?' on':''}" onclick="selCat('${p.key}')">${p.icon} ${p.label}</div>`).join('');
}
function selCat(c){ activeCat=c; renderCats(); renderMenu(); }

// ── MENU RENDERING ──────────────────────────────────────────────────────────
function buildMenu(){
  // Called once Firebase data is loaded
  menuData = window._menuData || [];
  renderMenu();
}

function getSvg(category){
  const key = (category||'').toLowerCase();
  return SVGS[key] || SVGS['indian'];
}

function renderMenu(){
  if(!window._menuLoaded){ return; }
  const wrap = document.getElementById('menuWrap');
  const q = document.getElementById('srch').value.toLowerCase().trim();

  // Group by category, maintaining CATS order
  const grouped = {};
  CATS.forEach(c=>{ grouped[c.key]=[]; });

  menuData.forEach(item=>{
    const cat = (item.category||'').toLowerCase();
    if(grouped[cat]) grouped[cat].push(item);
  });

  // Sort within each category: paneer first, then high-to-low price
  Object.keys(grouped).forEach(cat=>{
    grouped[cat].sort((a,b)=>{
      const aP = (a.name||'').toLowerCase().includes('paneer');
      const bP = (b.name||'').toLowerCase().includes('paneer');
      if(aP && !bP) return -1;
      if(!aP && bP) return 1;
      return (b.price||0)-(a.price||0);
    });
  });

  wrap.innerHTML='';

  const sections = activeCat==='all' ? CATS : CATS.filter(c=>c.cat===activeCat||c.key===activeCat);

  let anyShown = false;
  sections.forEach(catCfg=>{
    let items = grouped[catCfg.key]||[];
    if(q) items = items.filter(i=>{
      const name = (lang==='hi' && i.nameHi ? i.nameHi : i.name)||'';
      return name.toLowerCase().includes(q);
    });
    if(!items.length) return;
    anyShown = true;

    const sec = document.createElement('div');
    const title = lang==='hi' ? catCfg.labelHi : catCfg.label;
    sec.innerHTML = `<div class="sec-hd">${catCfg.icon} ${title}</div><div class="mlist" id="ml-${catCfg.key}"></div>`;
    wrap.appendChild(sec);

    const list = sec.querySelector(`#ml-${catCfg.key}`);
    items.forEach(item => renderCard(list, item));
  });

  if(!anyShown){
    wrap.innerHTML=`<div class="loading"><p style="font-size:14px;color:var(--muted)">${lang==='hi'?'कोई आइटम नहीं मिला':'No items found'}</p></div>`;
  }
}

function renderCard(list, item){
  const qty = cart[item.id]||0;
  const name = (lang==='hi' && item.nameHi) ? item.nameHi : item.name;
  const desc = (lang==='hi' && item.descHi) ? item.descHi : (item.description||item.desc||'');
  const isSoldOut = item.soldOut || item.available===false;
  const isBest = item.bestseller || item.best;

  const card = document.createElement('div');
  card.className='mcard'; card.id=`card-${item.id}`;

  card.innerHTML=`
    <div class="ptile">${getSvg(item.category)}</div>
    <div class="minfo">
      <div>
        <div class="vrow">
          <div class="vdot ${item.veg||item.isVeg?'v':'nv'}"></div>
          <div class="iname">${name}</div>
        </div>
        ${desc?`<div class="idesc">${desc}</div>`:''}
      </div>
      <div class="ifoot">
        <div class="iprice">₹${item.price}</div>
        <div id="ctrl-${item.id}"></div>
      </div>
    </div>
    ${isBest?`<div class="best-badge">${t('best')}</div>`:''}
  `;
  list.appendChild(card);
  renderCtrl(item.id, isSoldOut);
}

function renderCtrl(id, soldOut){
  const el = document.getElementById(`ctrl-${id}`); if(!el) return;
  const qty = cart[id]||0;
  if(soldOut){
    el.innerHTML=`<span class="sold-lbl">${t('soldOut')}</span>`;
    return;
  }
  el.innerHTML = qty===0
    ? `<button class="add-btn" onclick="addItem('${id}')">${t('add')}</button>`
    : `<div class="qctrl"><button class="qbtn" onclick="remItem('${id}')">−</button><span class="qnum">${qty}</span><button class="qbtn" onclick="addItem('${id}')">+</button></div>`;
}

function addItem(id){
  cart[id]=(cart[id]||0)+1;
  const item=menuData.find(i=>i.id===id);
  const sold=item&&(item.soldOut||item.available===false);
  renderCtrl(id,sold); updateCartBar();
  if(document.getElementById('overlay').classList.contains('show')) updateSheet();
}
function remItem(id){
  if(cart[id]>1) cart[id]--; else delete cart[id];
  const item=menuData.find(i=>i.id===id);
  const sold=item&&(item.soldOut||item.available===false);
  renderCtrl(id,sold); updateCartBar();
  if(document.getElementById('overlay').classList.contains('show')) updateSheet();
}

function cartTotals(){
  let qty=0, sub=0;
  Object.entries(cart).forEach(([id,q])=>{
    const item=menuData.find(i=>i.id===id);
    if(item){ qty+=q; sub+=q*item.price; }
  });
  return {qty, sub};
}

// ── CART BAR ────────────────────────────────────────────────────────────────
function updateCartBar(){
  const {qty, sub} = cartTotals();
  const bar = document.getElementById('cartBar');
  if(!qty){ bar.style.display='none'; return; }
  bar.style.display='flex';
  document.getElementById('cCount').textContent=qty;
  document.getElementById('cPrice').textContent=`₹${sub}`;
  document.getElementById('cLbl').innerHTML=`${t('viewCart')}<span>${t('cartSub')}</span>`;
}

// ── GPS ─────────────────────────────────────────────────────────────────────
function detectGPS(){
  if(!navigator.geolocation){ showToast(t('gpsErr')); return; }
  const btn=document.getElementById('gpsBtn');
  btn.innerHTML=`<span>⏳</span><span>${lang==='hi'?'लोकेशन ढूंढ रहे हैं...':'Detecting location...'}</span>`;
  navigator.geolocation.getCurrentPosition(pos=>{
    const dist = haversine(pos.coords.latitude, pos.coords.longitude, RESTAURANT_LAT, RESTAURANT_LNG);
    const distR = Math.round(dist*10)/10;
    const {sub} = cartTotals();
    const charge = deliveryCharge(distR, sub);

    if(charge===-1){
      document.getElementById('gpsStatus').className='gps-status far';
      document.getElementById('gpsStatus').textContent=t('farErr',{d:distR});
      gpsData=null;
      btn.innerHTML=`<span>📍</span><span>${t('detectGPS')}</span>`;
    } else {
      gpsData={dist:distR, charge};
      btn.className='gps-btn detected';
      btn.innerHTML=`<span>📍</span><span>${t('locationDetected')}</span>`;
      const statusEl=document.getElementById('gpsStatus');
      if(charge===0){
        statusEl.className='gps-status ok';
        statusEl.textContent=t('gpsFree',{d:distR});
      } else {
        statusEl.className='gps-status ok';
        statusEl.textContent=t('gpsOk',{d:distR,c:charge});
      }
    }
    updateSheet();
  }, ()=>{
    document.getElementById('gpsStatus').className='gps-status err';
    document.getElementById('gpsStatus').textContent=t('gpsErr');
    btn.innerHTML=`<span>📍</span><span>${t('detectGPS')}</span>`;
    gpsData=null;
  });
}

// ── CHECKOUT ─────────────────────────────────────────────────────────────────
function openCheckout(){
  const {qty}=cartTotals(); if(!qty) return;
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
  applyLang();
  updateSheet();
}
function closeCheckout(){
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow='';
}
function overlayClick(e){ if(e.target===document.getElementById('overlay')) closeCheckout(); }

function setOtype(type){
  orderType=type;
  document.getElementById('btnPickup').classList.toggle('on', type==='pickup');
  document.getElementById('btnDelivery').classList.toggle('on', type==='delivery');
  document.getElementById('gpsSection').style.display=type==='delivery'?'block':'none';
  document.getElementById('addrSection').style.display=type==='delivery'?'block':'none';
  document.getElementById('delRow').style.display=type==='delivery'?'flex':'none';
  updateSheet();
}

function updateSheet(){
  const {qty, sub} = cartTotals();

  // Cart items list
  const ciWrap=document.getElementById('cartItems');
  ciWrap.innerHTML='';
  Object.entries(cart).forEach(([id,q])=>{
    const item=menuData.find(i=>i.id===id); if(!item) return;
    const name=(lang==='hi'&&item.nameHi)?item.nameHi:item.name;
    const row=document.createElement('div'); row.className='ci-row';
    row.innerHTML=`<span class="ci-name">${name}</span><span class="ci-qty">×${q}</span><span class="ci-price">₹${item.price*q}</span>`;
    ciWrap.appendChild(row);
  });

  // Delivery charge
  let delCharge = 0;
  if(orderType==='delivery'){
    if(gpsData) delCharge=deliveryCharge(gpsData.dist, sub);
    else delCharge=sub>=FREE_DEL_MIN?0:50; // default estimate
  }

  // Free delivery progress bar
  const freeBar=document.getElementById('freeBar');
  const freeBarTxt=document.getElementById('freeBarTxt');
  const progFill=document.getElementById('progFill');
  if(orderType==='delivery' && sub<FREE_DEL_MIN && delCharge>0){
    freeBar.classList.add('show');
    const remain=FREE_DEL_MIN-sub;
    const pct=Math.min(100,Math.round(sub/FREE_DEL_MIN*100));
    freeBarTxt.textContent=t('freeBarTxt',{r:remain});
    progFill.style.width=pct+'%';
  } else {
    freeBar.classList.remove('show');
  }

  const total = sub + (orderType==='delivery' ? (delCharge>0?delCharge:0) : 0);
  document.getElementById('sumSub').textContent=`₹${sub}`;

  const delRow=document.getElementById('sumDel');
  if(orderType==='delivery'){
    if(delCharge===0) {
      delRow.textContent=t('freeDelRow');
      delRow.parentElement.className='sum-row free-del';
    } else if(delCharge>0){
      delRow.textContent=`₹${delCharge}`;
      delRow.parentElement.className='sum-row';
    } else {
      delRow.textContent=lang==='hi'?'क्षेत्र के बाहर':'Out of range';
      delRow.parentElement.className='sum-row';
    }
  }

  document.getElementById('sumTotal').textContent=`₹${total}`;
  document.getElementById('waBtnPrice').textContent=` ₹${total}`;
}

// ── PLACE ORDER ──────────────────────────────────────────────────────────────
function placeOrder(){
  const name=document.getElementById('custName').value.trim();
  const phone=document.getElementById('custPhone').value.trim();
  const addr=document.getElementById('custAddr').value.trim();

  // Validate
  document.getElementById('custName').classList.remove('err-field');
  document.getElementById('custPhone').classList.remove('err-field');

  if(!name){ showToast(t('nameErr')); document.getElementById('custName').classList.add('err-field'); return; }
  if(!/^\d{10}$/.test(phone)){ showToast(t('phoneErr')); document.getElementById('custPhone').classList.add('err-field'); return; }
  if(orderType==='delivery' && gpsData && gpsData.charge===-1){ showToast(t('farErr',{d:gpsData.dist})); return; }

  const {sub} = cartTotals();
  const delCharge = orderType==='delivery' ? (gpsData?deliveryCharge(gpsData.dist,sub):sub>=FREE_DEL_MIN?0:50) : 0;
  const total = sub + (orderType==='delivery' && delCharge>0 ? delCharge : 0);

  // Build WhatsApp message
  let msg = `🍽️ *New Order — Urban ज़ायका*\n\n`;
  msg += `👤 *Name:* ${name}\n`;
  msg += `📱 *Mobile:* ${phone}\n`;
  msg += `🛵 *Type:* ${orderType==='delivery'?'Delivery':'Pickup'}\n`;
  if(orderType==='delivery'){
    if(gpsData) msg+=`📍 *Distance:* ${gpsData.dist}km\n`;
    if(addr) msg+=`🏠 *Address:* ${addr}\n`;
  }
  msg+=`\n📋 *Order Details:*\n`;
  Object.entries(cart).forEach(([id,q])=>{
    const item=menuData.find(i=>i.id===id); if(!item) return;
    msg+=`• ${item.name} ×${q} — ₹${item.price*q}\n`;
  });
  msg+=`\n💰 *Subtotal:* ₹${sub}`;
  if(orderType==='delivery') msg+=`\n🚚 *Delivery:* ${delCharge===0?'FREE':'₹'+delCharge}`;
  msg+=`\n✅ *Total: ₹${total}*`;

  const url=`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;

  // 3-second countdown
  const btn=document.getElementById('waBtn');
  btn.disabled=true;
  let n=3;
  const tick=()=>{
    document.getElementById('waBtnTxt').textContent=t('countdown',{n});
    if(n===0){ window.open(url,'_blank'); closeCheckout(); cart={}; updateCartBar(); renderMenu(); return; }
    n--; setTimeout(tick,1000);
  };
  tick();
}

setOtype('delivery');

// Poll for Firebase data
window._initDone=true;
if(window._menuLoaded){ buildMenu(); }
else{
  const poll=setInterval(()=>{
    if(window._menuLoaded){ clearInterval(poll); buildMenu(); }
  },200);
  setTimeout(()=>clearInterval(poll),15000);
}

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
