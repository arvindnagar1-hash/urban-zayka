<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#16213E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Urban ज़ायका — Order</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#F40009;--navy:#16213E;--navy2:#1A1A2E}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── WELCOME SCREEN ── */
#sc-welcome{background:var(--navy);flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;display:none}
#sc-welcome.active{display:flex}
.welcome-logo{width:80px;height:80px;background:var(--red);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px}
.welcome-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px}
.welcome-sub{font-size:14px;color:#A0A0B0;margin-bottom:32px}
.welcome-divider{width:40px;height:3px;background:var(--red);border-radius:2px;margin:0 auto 32px}
.welcome-form{width:100%;max-width:340px}
.wf-label{font-size:11px;font-weight:600;color:#A0A0B0;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:8px;text-align:left}
.wf-input{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;font-size:16px;color:#fff;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .2s}
.wf-input::placeholder{color:rgba(255,255,255,.4)}
.wf-input:focus{border-color:var(--red)}
.wf-input.err{border-color:#ff6b6b}
.start-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .2s}
.start-btn:active{opacity:.85}
.err-msg{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);color:#ff9999;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.err-msg.show{display:block}

/* ── MENU SCREEN ── */
#sc-menu{background:#f5f5f5;padding-bottom:90px}
.app-header{background:var(--navy);padding:14px 16px 12px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-logo{width:38px;height:38px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-info{flex:1;padding:0 10px}
.hdr-info h1{font-size:16px;font-weight:700;color:#fff}
.hdr-info small{font-size:11px;color:#A0A0B0;display:block;margin-top:1px}
.hdr-guest{font-size:12px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);border-radius:20px;padding:5px 11px;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-wrap{background:rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12)}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;font-family:inherit}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.tabs-bar{display:flex;gap:6px;padding:10px 12px;background:#fff;position:sticky;top:106px;z-index:99;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #eee}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{white-space:nowrap;border:1px solid #e0e0e0;background:#f8f8f8;color:#666;border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;flex-shrink:0;font-family:inherit}
.tab-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.menu-body{padding:6px 12px 12px;background:#fff;min-height:60vh}
.sec-head{font-size:11px;font-weight:700;color:var(--red);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.6px;border-left:3px solid var(--red);padding-left:8px}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.item-img{width:52px;height:52px;border-radius:12px;flex-shrink:0;overflow:hidden;background:#fff5f5;border:1px solid #fde0e0;display:flex;align-items:center;justify-content:center;font-size:24px}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:#1a1a1a}
.item-desc{font-size:11px;color:#999;margin-top:2px}
.item-price{font-size:13px;font-weight:700;color:var(--red);margin-top:3px}
.add-btn{background:var(--red);color:#fff;border:none;border-radius:8px;width:30px;height:30px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-ctrl button{background:var(--red);color:#fff;border:none;border-radius:6px;width:26px;height:26px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qty-ctrl span{font-size:14px;font-weight:600;min-width:16px;text-align:center}
.soldout-tag{background:#f5f5f5;color:#aaa;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;flex-shrink:0}
.loading-menu{text-align:center;padding:50px 20px;color:#aaa;font-size:14px}

/* ── FLOAT CART BAR ── */
.float-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:456px;background:var(--red);color:#fff;border-radius:14px;padding:14px 18px;display:none;align-items:center;justify-content:space-between;cursor:pointer;border:none;font-family:inherit;margin-bottom:10px;box-shadow:0 4px 24px rgba(244,0,9,.35);z-index:200}
.float-bar.vis{display:flex}
.float-bar span{font-size:14px;font-weight:600}

/* ── CART SCREEN ── */
#sc-cart{background:#fff;flex-direction:column;position:fixed;inset:0;max-width:480px;left:50%;transform:translateX(-50%);z-index:300;display:none}
#sc-cart.active{display:flex}

.cart-hdr{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;line-height:1}
.cart-hdr h2{font-size:16px;font-weight:600}
.cart-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cart-items{padding:12px}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.ci-name{font-size:13px;font-weight:500}
.ci-price{font-size:12px;color:#888;margin-top:2px}
.guest-info-bar{background:#f9f9f9;border-radius:12px;padding:12px 14px;margin:0 12px 12px;font-size:13px;color:#555}
.guest-info-bar strong{color:#1a1a1a}
.bill-box{margin:0 12px 12px;border:1px solid #eee;border-radius:12px;overflow:hidden}
.bill-row{display:flex;justify-content:space-between;padding:10px 14px;font-size:13px;border-bottom:1px solid #f5f5f5;color:#666}
.bill-row:last-child{border-bottom:none;font-weight:700;color:#1a1a1a;font-size:14px}
.cart-footer{padding:12px;background:#fff;border-top:1px solid #eee;flex-shrink:0}
.confirm-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between}
.confirm-btn:disabled{opacity:.6;cursor:not-allowed}
.empty-cart{text-align:center;padding:60px 20px;color:#bbb}
.empty-cart .ei{font-size:52px;margin-bottom:12px}

/* ── SUCCESS SCREEN ── */
#sc-success{background:#f5f5f5;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;display:none}
#sc-success.active{display:flex}
.suc-icon{width:72px;height:72px;background:#E8F5E9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
.suc-title{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.suc-ref{font-size:13px;color:#888;margin-bottom:24px}
.suc-card{background:#fff;border-radius:16px;padding:18px;width:100%;max-width:340px;margin:0 auto 20px;border:1px solid #eee;text-align:left}
.suc-card-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.suc-item{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.suc-item:last-child{border-bottom:none;font-weight:700;font-size:14px;color:var(--red);margin-top:4px;padding-top:10px;border-top:1px solid #eee}
.suc-msg{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:340px;margin:0 auto 20px;border:1px solid #eee;text-align:center}
.suc-msg p{font-size:14px;color:#555;line-height:1.7}
.new-order-btn{background:var(--red);color:#fff;border:none;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:500;z-index:9999;display:none;white-space:nowrap}
.toast.show{display:block}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ── WELCOME ── -->
<div class="screen active" id="sc-welcome">
  <div class="welcome-logo">🍽️</div>
  <div class="welcome-title">Urban ज़ायका</div>
  <div class="welcome-sub">Met City · 7AM – 10:30PM</div>
  <div class="welcome-divider"></div>
  <div class="welcome-form">
    <div class="err-msg" id="err-msg">Please fill in all details</div>
    <label class="wf-label">Your Name</label>
    <input class="wf-input" id="w-name" type="text" placeholder="Enter your name" autocomplete="name"/>
    <label class="wf-label">Mobile Number</label>
    <input class="wf-input" id="w-phone" type="tel" placeholder="10-digit mobile number" maxlength="10" autocomplete="tel"/>
    <button class="start-btn" onclick="startOrder()">View Menu →</button>
  </div>
</div>

<!-- ── MENU ── -->
<div class="screen" id="sc-menu">
  <div class="app-header">
    <div class="hdr-top">
      <div class="hdr-logo">🍽️</div>
      <div class="hdr-info">
        <h1>Urban ज़ायका</h1>
        <small>Met City · 7AM – 10:30PM</small>
      </div>
      <div class="hdr-guest" id="hdr-guest">Guest</div>
    </div>
    <div class="search-wrap">
      <span style="font-size:14px">🔍</span>
      <input type="search" placeholder="Search dishes..." oninput="searchMenu(this.value)" autocomplete="off"/>
    </div>
  </div>
  <div class="tabs-bar" id="tabs-bar"></div>
  <div class="menu-body" id="menu-body">
    <div class="loading-menu">⏳ Loading menu...</div>
  </div>
  <button class="float-bar" id="float-bar" onclick="showCart()">
    <span id="fb-count">🛒 0 items</span>
    <span id="fb-label">View Cart →</span>
    <span id="fb-total">₹0</span>
  </button>
</div>

<!-- ── CART ── -->
<div class="screen" id="sc-cart">
  <div class="cart-hdr">
    <button class="back-btn" onclick="hideCart()">←</button>
    <h2>Your Order</h2>
  </div>
  <div class="cart-scroll">
    <div class="cart-items" id="cart-items"></div>
    <div class="guest-info-bar" id="guest-info-bar"></div>
    <div class="bill-box" id="bill-box"></div>
  </div>
  <div class="cart-footer">
    <button class="confirm-btn" id="confirm-btn" onclick="placeOrder()">
      <span>✅ Place Order</span>
      <span id="confirm-total">₹0</span>
    </button>
  </div>
</div>

<!-- ── SUCCESS ── -->
<div class="screen" id="sc-success">
  <div class="suc-icon">✅</div>
  <div class="suc-title">Order Placed!</div>
  <div class="suc-ref" id="suc-ref">Order ID: —</div>
  <div class="suc-card">
    <div class="suc-card-title">Order Summary</div>
    <div id="suc-items"></div>
  </div>
  <div class="suc-msg">
    <p>🙏 Aapka order receive ho gaya!<br>Thodi der mein taiyar ho jaayega.</p>
  </div>
  <button class="new-order-btn" onclick="resetOrder()">+ New Order</button>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const WHATSAPP_NO = '918860609555';
const PRINTNODE_KEY = 'DyQsAq9AOczxV7Rz3LuMdOIIsOts8X7o4_8NpEZ7r7M';
const PRINTNODE_PRINTER = 75568733;
const CAT_ORDER = ['breakfast','starters','sandwiches','indian','chinese','breads','meals','beverages'];
const CAT_LABELS = {breakfast:'🌅 Breakfast',starters:'🍢 Starters',sandwiches:'🥪 Sandwiches',indian:'🍛 Indian Main',chinese:'🥢 Chinese',breads:'🫓 Breads',meals:'🍱 Meals',beverages:'☕ Beverages'};

// ── FIREBASE ─────────────────────────────────────────────────────────────────
if (typeof firebase === 'undefined') { console.warn('Firebase not loaded'); MENU=[]; buildTabs(); renderMenu(); } else { firebase.initializeApp({
  apiKey:"AIzaSyBkgTWZwKcXy5BiCVpppltZWVTW7gIPDbE",
  authDomain:"urban-zayka.firebaseapp.com",
  projectId:"urban-zayka",
  storageBucket:"urban-zayka.firebasestorage.app",
  messagingSenderId:"849575139822",
  appId:"1:849575139822:web:01e6d124f8d78267b196ff"
});
} // end else
var db = typeof firebase !== 'undefined' ? firebase.firestore() : null;

// ── STATE ────────────────────────────────────────────────────────────────────
let guestName = '', guestPhone = '';
var MENU = [], cart = {}, activeCat = 'all';

// ── FIREBASE MENU LOAD ───────────────────────────────────────────────────────
if (!db) { buildTabs(); renderMenu(); } else { db.collection('menuItems').get().then(function(snap) {
  if (!snap.empty) {
    MENU = snap.docs.map(function(d) { return Object.assign({}, d.data(), {id:d.id}); });
  } else {
    return db.collection('menu').get().then(function(snap2) {
      MENU = snap2.docs.map(function(d) { return Object.assign({}, d.data(), {id:d.id}); });
    });
  }
}).catch(function() {
  MENU = [];
}).finally(function() {
  buildTabs();
  renderMenu();
}); } // end if db

// ── WELCOME ──────────────────────────────────────────────────────────────────
function startOrder() {
  var name = document.getElementById('w-name').value.trim();
  var phone = document.getElementById('w-phone').value.trim();
  var err = document.getElementById('err-msg');
  err.classList.remove('show');
  document.getElementById('w-name').classList.remove('err');
  document.getElementById('w-phone').classList.remove('err');
  if (!name) { document.getElementById('w-name').classList.add('err'); err.textContent='Please enter your name'; err.classList.add('show'); return; }
  if (!phone || phone.length < 10 || isNaN(phone)) { document.getElementById('w-phone').classList.add('err'); err.textContent='Please enter a valid 10-digit mobile number'; err.classList.add('show'); return; }
  guestName = name;
  guestPhone = phone;
  document.getElementById('hdr-guest').textContent = name.split(' ')[0];
  showScreen('sc-menu');
}

// ── SCREENS ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showCart() {
  renderCart();
  document.getElementById('sc-cart').classList.add('active');
}
function hideCart() {
  document.getElementById('sc-cart').classList.remove('active');
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function buildTabs() {
  var cats = ['all'];
  CAT_ORDER.forEach(function(c) {
    if (MENU.some(function(i) { return (i.category||i.cat)===c; })) cats.push(c);
  });
  var bar = document.getElementById('tabs-bar');
  bar.innerHTML = cats.map(function(c) {
    return '<button class="tab-btn' + (activeCat===c?' active':'') + '" onclick="setTab(\''+c+'\')">' + (c==='all'?'All Items':(CAT_LABELS[c]||c)) + '</button>';
  }).join('');
}

function setTab(cat) {
  activeCat = cat;
  buildTabs();
  renderMenu();
}

// ── MENU RENDER ──────────────────────────────────────────────────────────────
function renderMenu(searchQ) {
  var el = document.getElementById('menu-body');
  var items = MENU.filter(function(i) {
    var catOk = activeCat==='all' || (i.category||i.cat)===activeCat;
    var qOk = !searchQ || (i.name||'').toLowerCase().indexOf(searchQ.toLowerCase()) > -1 || ((i.description||i.desc||'').toLowerCase().indexOf(searchQ.toLowerCase()) > -1);
    return catOk && qOk && !i.soldOut && i.available !== false;
  });
  if (!items.length) {
    el.innerHTML = '<div style="text-align:center;padding:50px 20px;color:#bbb"><div style="font-size:40px;margin-bottom:10px">🔍</div><p>Koi item nahi mila</p></div>';
    return;
  }
  var html = '';
  var lastCat = '';
  var sorted = items.slice().sort(function(a,b) {
    var ai = CAT_ORDER.indexOf(a.category||a.cat), bi = CAT_ORDER.indexOf(b.category||b.cat);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });
  sorted.forEach(function(item) {
    var cat = item.category || item.cat || '';
    if (activeCat==='all' && cat !== lastCat) {
      html += '<div class="sec-head">' + (CAT_LABELS[cat]||cat) + '</div>';
      lastCat = cat;
    }
    var key = item.id;
    var qty = cart[key] || 0;
    var ctrl = qty === 0
      ? '<button class="add-btn" onclick="addItem(\''+key+'\')">+</button>'
      : '<div class="qty-ctrl"><button onclick="removeItem(\''+key+'\')">&#8722;</button><span>'+qty+'</span><button onclick="addItem(\''+key+'\')">+</button></div>';
    var thumb = item.imageUrl
      ? '<div class="item-img"><img src="'+item.imageUrl+'" onerror="this.parentNode.innerHTML=\''+(item.emoji||'🍽️')+'\'" /></div>'
      : '<div class="item-img">'+(item.emoji||'🍽️')+'</div>';
    html += '<div class="menu-item">'+thumb+'<div class="item-info"><div class="item-name">'+item.name+'</div>'+(item.description||item.desc?'<div class="item-desc">'+(item.description||item.desc)+'</div>':'')+'<div class="item-price">&#8377;'+item.price+'</div></div>'+ctrl+'</div>';
  });
  el.innerHTML = html;
}

function searchMenu(q) { renderMenu(q); }

// ── CART ─────────────────────────────────────────────────────────────────────
function addItem(id) {
  cart[id] = (cart[id]||0) + 1;
  updateFloatBar();
  renderMenu();
}
function removeItem(id) {
  if (cart[id] > 1) cart[id]--;
  else delete cart[id];
  updateFloatBar();
  renderMenu();
}
function cartTotal() {
  return Object.keys(cart).reduce(function(sum, id) {
    var item = MENU.find(function(m) { return m.id===id; });
    return sum + (item ? item.price * cart[id] : 0);
  }, 0);
}
function cartCount() {
  return Object.values(cart).reduce(function(s,q) { return s+q; }, 0);
}
function updateFloatBar() {
  var cnt = cartCount();
  var fb = document.getElementById('float-bar');
  if (cnt > 0) {
    fb.classList.add('vis');
    document.getElementById('fb-count').textContent = '🛒 ' + cnt + (cnt===1?' item':' items');
    document.getElementById('fb-total').textContent = '&#8377;' + cartTotal();
  } else {
    fb.classList.remove('vis');
  }
}
function renderCart() {
  var items = Object.keys(cart);
  var el = document.getElementById('cart-items');
  if (!items.length) {
    el.innerHTML = '<div class="empty-cart"><div class="ei">🛒</div><p>Cart is empty</p></div>';
    document.getElementById('bill-box').innerHTML = '';
    document.getElementById('confirm-total').textContent = '₹0';
    return;
  }
  var html = '';
  items.forEach(function(id) {
    var item = MENU.find(function(m) { return m.id===id; });
    if (!item) return;
    var qty = cart[id];
    html += '<div class="cart-item"><div><div class="ci-name">'+(item.emoji||'🍽️')+' '+item.name+'</div><div class="ci-price">&#8377;'+item.price+' &#215; '+qty+' = &#8377;'+(item.price*qty)+'</div></div><div class="qty-ctrl"><button onclick="removeItem(\''+id+'\');renderCart()">&#8722;</button><span>'+qty+'</span><button onclick="addItem(\''+id+'\');renderCart()">+</button></div></div>';
  });
  el.innerHTML = html;
  document.getElementById('guest-info-bar').innerHTML = '<strong>👤 '+guestName+'</strong> &nbsp;|&nbsp; 📱 '+guestPhone;
  var sub = cartTotal();
  document.getElementById('bill-box').innerHTML = '<div class="bill-row"><span>Subtotal</span><span>&#8377;'+sub+'</span></div><div class="bill-row"><span>Total</span><span>&#8377;'+sub+'</span></div>';
  document.getElementById('confirm-total').textContent = '₹'+sub;
}

// ── PLACE ORDER ──────────────────────────────────────────────────────────────
function placeOrder() {
  var items = Object.keys(cart);
  if (!items.length) { showToast('Pehle kuch items add karein'); return; }
  var sub = cartTotal();
  var refNo = 'UZ' + Date.now().toString().slice(-6);
  var orderItems = [];
  items.forEach(function(id) {
    var item = MENU.find(function(m) { return m.id===id; });
    if (item) orderItems.push({name:item.name, qty:cart[id], price:item.price, total:item.price*cart[id]});
  });
  var orderData = {
    orderId: refNo,
    customerName: guestName,
    customerPhone: guestPhone,
    orderType: 'dine-in',
    source: 'table-qr',
    items: orderItems,
    subtotal: sub,
    total: sub,
    deliveryCharge: 0,
    status: 'new',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  var btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Placing order...';

  if (!db) { showToast('❌ Firebase not available'); btn.disabled=false; btn.querySelector('span').textContent='✅ Place Order'; return; } db.collection('orders').add(orderData).then(function() {
    printReceipt(refNo, orderItems, sub);
    showSuccess(refNo, orderItems, sub);
  }).catch(function(e) {
    console.error(e);
    // Try without server timestamp
    orderData.createdAt = new Date();
    db.collection('orders').add(orderData).then(function() {
      printReceipt(refNo, orderItems, sub);
      showSuccess(refNo, orderItems, sub);
    }).catch(function() {
      showToast('❌ Order failed. Please try again.');
      btn.disabled = false;
      btn.querySelector('span').textContent = '✅ Place Order';
    });
  });
}

// ── PRINT ─────────────────────────────────────────────────────────────────────
function printReceipt(refNo, items, total) {
  var line  = '--------------------------------';
  var dline = '================================';
  var pad = function(l,r,w) {
    w = w||32;
    return l + Array(Math.max(1,w-l.length-r.length+1)).join(' ') + r;
  };
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  var timeStr = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

  var txt = '';
  txt += '\x1B\x61\x01'; // center
  txt += 'Urban Zayka\n';
  txt += 'Met City, Haryana\n';
  txt += 'Ph: 8860609555\n';
  txt += '\x1B\x61\x00'; // left
  txt += dline+'\n';
  txt += 'Order: #'+refNo+'\n';
  txt += 'Date : '+dateStr+' '+timeStr+'\n';
  txt += 'Type : Dine-In (QR Order)\n';
  txt += 'Name : '+guestName+'\n';
  txt += 'Phone: '+guestPhone+'\n';
  txt += line+'\n';
  txt += pad('ITEM','AMT')+'\n';
  txt += line+'\n';
  items.forEach(function(item) {
    var nq = item.name + ' x' + item.qty;
    var pr = 'Rs.' + item.total;
    if (nq.length + pr.length >= 31) {
      txt += nq.substring(0,32)+'\n'+pad('',pr)+'\n';
    } else {
      txt += pad(nq,pr)+'\n';
    }
  });
  txt += line+'\n';
  txt += dline+'\n';
  txt += pad('TOTAL','Rs.'+total)+'\n';
  txt += dline+'\n';
  txt += '\x1B\x61\x01'; // center
  txt += '\nThank you!\nurbanzayka.in\n';
  txt += '\x1D\x56\x41\x05'; // cut
  txt += '\n\n\n';

  var bytes = new TextEncoder().encode(txt);
  var b64 = btoa(String.fromCharCode.apply(null, Array.from(bytes)));

  fetch('https://api.printnode.com/printjobs', {
    method: 'POST',
    headers: {
      'Authorization': 'Basic ' + btoa(PRINTNODE_KEY + ':'),
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      printerId: PRINTNODE_PRINTER,
      title: 'Order #' + refNo,
      contentType: 'raw_base64',
      content: b64,
      source: 'Urban Zayka QR Order'
    })
  }).then(function(r) {
    if (r.ok) console.log('Print job sent');
    else console.warn('Print failed:', r.status);
  }).catch(function(e) {
    console.warn('Print error:', e);
  });
}

// ── SUCCESS ───────────────────────────────────────────────────────────────────
function showSuccess(refNo, items, total) {
  document.getElementById('suc-ref').textContent = 'Order ID: ' + refNo;
  var html = '';
  items.forEach(function(i) {
    html += '<div class="suc-item"><span>'+i.name+' &#215;'+i.qty+'</span><span>&#8377;'+i.total+'</span></div>';
  });
  html += '<div class="suc-item"><span>Total</span><span>&#8377;'+total+'</span></div>';
  document.getElementById('suc-items').innerHTML = html;
  document.getElementById('sc-cart').classList.remove('active');
  showScreen('sc-success');
}

function resetOrder() {
  cart = {};
  guestName = '';
  guestPhone = '';
  document.getElementById('w-name').value = '';
  document.getElementById('w-phone').value = '';
  showScreen('sc-welcome');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// Enter key on welcome
document.getElementById('w-phone').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startOrder();
});
document.getElementById('w-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('w-phone').focus();
});
</script>
