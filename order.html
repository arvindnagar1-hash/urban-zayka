<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#16213E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Urban ज़ायका — Order</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#F40009;--navy:#16213E}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;overflow-x:hidden}

/* ── ALL SCREENS HIDDEN BY DEFAULT ── */
.screen{display:none;min-height:100vh;min-height:100dvh}
.screen.active{display:block}

/* ── WELCOME ── */
#sc-welcome.active{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--navy);padding:32px 24px;text-align:center}
.w-logo{width:80px;height:80px;background:var(--red);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px}
.w-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px}
.w-sub{font-size:14px;color:#A0A0B0;margin-bottom:32px}
.w-line{width:40px;height:3px;background:var(--red);border-radius:2px;margin:0 auto 32px}
.w-form{width:100%;max-width:340px}
.w-label{font-size:11px;font-weight:600;color:#A0A0B0;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:8px;text-align:left}
.w-input{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;font-size:16px;color:#fff;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .2s}
.w-input::placeholder{color:rgba(255,255,255,.35)}
.w-input:focus{border-color:var(--red)}
.w-input.err{border-color:#ff6b6b}
.w-err{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:#ff9999;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.w-err.show{display:block}
.w-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── MENU SCREEN ── */
#sc-menu.active{display:block;background:#f5f5f5;padding-bottom:90px}
.m-header{background:var(--navy);padding:14px 16px 12px;position:sticky;top:0;z-index:50}
.m-hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.m-logo{width:38px;height:38px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.m-info{flex:1}
.m-info h1{font-size:16px;font-weight:700;color:#fff}
.m-info small{font-size:11px;color:#A0A0B0}
.m-guest{font-size:11px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);border-radius:20px;padding:5px 11px;flex-shrink:0;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-search{background:rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12)}
.m-search input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;font-family:inherit}
.m-search input::placeholder{color:rgba(255,255,255,.4)}
.m-tabs{display:flex;gap:6px;padding:10px 12px;background:#fff;position:sticky;top:106px;z-index:49;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #eee}
.m-tabs::-webkit-scrollbar{display:none}
.m-tab{white-space:nowrap;border:1px solid #e0e0e0;background:#f8f8f8;color:#666;border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;flex-shrink:0;font-family:inherit}
.m-tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.m-body{padding:6px 12px 12px;background:#fff}
.m-sec{font-size:11px;font-weight:700;color:var(--red);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.6px;border-left:3px solid var(--red);padding-left:8px}
.m-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.m-thumb{width:52px;height:52px;border-radius:12px;flex-shrink:0;background:#fff5f5;border:1px solid #fde0e0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.m-thumb img{width:100%;height:100%;object-fit:cover}
.m-iinfo{flex:1;min-width:0}
.m-iname{font-size:14px;font-weight:500;color:#1a1a1a}
.m-idesc{font-size:11px;color:#999;margin-top:2px}
.m-iprice{font-size:13px;font-weight:700;color:var(--red);margin-top:3px}
.m-add{background:var(--red);color:#fff;border:none;border-radius:8px;width:30px;height:30px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.m-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.m-qty button{background:var(--red);color:#fff;border:none;border-radius:6px;width:26px;height:26px;font-size:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.m-qty span{font-size:14px;font-weight:600;min-width:16px;text-align:center}
.m-float{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:456px;background:var(--red);color:#fff;border-radius:14px;padding:14px 18px;display:none;align-items:center;justify-content:space-between;cursor:pointer;border:none;font-family:inherit;box-shadow:0 4px 24px rgba(244,0,9,.35);z-index:100}
.m-float.vis{display:flex}
.m-float span{font-size:14px;font-weight:600}

/* ── CART — full screen overlay ── */
#sc-cart{position:fixed;inset:0;background:#fff;z-index:500;display:none;flex-direction:column;max-width:480px;left:50%;transform:translateX(-50%)}
#sc-cart.active{display:flex}
.c-hdr{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.c-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;line-height:1}
.c-hdr h2{font-size:16px;font-weight:600}
.c-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.c-items{padding:12px}
.c-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.c-iname{font-size:13px;font-weight:500}
.c-iprice{font-size:12px;color:#888;margin-top:2px}
.c-guest{background:#f9f9f9;border-radius:12px;padding:12px 14px;margin:0 12px 12px;font-size:13px;color:#555}
.c-bill{margin:0 12px 12px;border:1px solid #eee;border-radius:12px;overflow:hidden}
.c-brow{display:flex;justify-content:space-between;padding:10px 14px;font-size:13px;border-bottom:1px solid #f5f5f5;color:#666}
.c-brow:last-child{border-bottom:none;font-weight:700;color:#1a1a1a;font-size:14px}
.c-footer{padding:12px;background:#fff;border-top:1px solid #eee;flex-shrink:0}
.c-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between}
.c-btn:disabled{opacity:.6;cursor:not-allowed}
.c-empty{text-align:center;padding:60px 20px;color:#bbb}
.c-empty div{font-size:52px;margin-bottom:12px}

/* ── SUCCESS — full screen overlay ── */
#sc-success{position:fixed;inset:0;background:#f5f5f5;z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;overflow-y:auto;max-width:480px;left:50%;transform:translateX(-50%)}
#sc-success.active{display:flex}
.s-icon{width:72px;height:72px;background:#E8F5E9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
.s-title{font-size:22px;font-weight:700;margin-bottom:6px}
.s-ref{font-size:13px;color:#888;margin-bottom:24px}
.s-card{background:#fff;border-radius:16px;padding:18px;width:100%;max-width:340px;margin:0 auto 16px;border:1px solid #eee;text-align:left}
.s-card-hd{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.s-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.s-row:last-child{border-bottom:none;font-weight:700;font-size:14px;color:var(--red);margin-top:4px;padding-top:10px;border-top:1px solid #eee}
.s-msg{font-size:14px;color:#555;line-height:1.8;margin-bottom:24px}
.s-newbtn{background:var(--red);color:#fff;border:none;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:500;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast.show{display:block}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ── WELCOME ── -->
<div class="screen active" id="sc-welcome">
  <div class="w-logo">🍽️</div>
  <div class="w-title">Urban ज़ायका</div>
  <div class="w-sub">Met City · 7AM – 10:30PM</div>
  <div class="w-line"></div>
  <div class="w-form">
    <div class="w-err" id="w-err"></div>
    <label class="w-label">Your Name</label>
    <input class="w-input" id="w-name" type="text" placeholder="Enter your name" autocomplete="name"/>
    <label class="w-label">Mobile Number</label>
    <input class="w-input" id="w-phone" type="tel" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric"/>
    <button class="w-btn" onclick="startOrder()">View Menu →</button>
  </div>
</div>

<!-- ── MENU ── -->
<div class="screen" id="sc-menu">
  <div class="m-header">
    <div class="m-hdr-top">
      <div class="m-logo">🍽️</div>
      <div class="m-info">
        <h1>Urban ज़ायका</h1>
        <small>Met City · 7AM – 10:30PM</small>
      </div>
      <div class="m-guest" id="m-guest">Guest</div>
    </div>
    <div class="m-search">
      <span>🔍</span>
      <input type="search" placeholder="Search dishes..." oninput="doSearch(this.value)" autocomplete="off"/>
    </div>
  </div>
  <div class="m-tabs" id="m-tabs"></div>
  <div class="m-body" id="m-body"><div style="text-align:center;padding:50px 20px;color:#aaa">⏳ Loading menu...</div></div>
  <button class="m-float" id="m-float" onclick="openCart()">
    <span id="fl-count">🛒 0 items</span>
    <span id="fl-label">View Cart →</span>
    <span id="fl-total">₹0</span>
  </button>
</div>

<!-- ── CART ── -->
<div id="sc-cart">
  <div class="c-hdr">
    <button class="c-back" onclick="closeCart()">←</button>
    <h2>Your Order</h2>
  </div>
  <div class="c-scroll">
    <div class="c-items" id="c-items"></div>
    <div class="c-guest" id="c-guest"></div>
    <div class="c-bill" id="c-bill"></div>
  </div>
  <div class="c-footer">
    <button class="c-btn" id="c-btn" onclick="placeOrder()">
      <span id="c-btn-txt">✅ Place Order</span>
      <span id="c-btn-total">₹0</span>
    </button>
  </div>
</div>

<!-- ── SUCCESS ── -->
<div id="sc-success">
  <div class="s-icon">✅</div>
  <div class="s-title">Order Placed!</div>
  <div class="s-ref" id="s-ref">Order #—</div>
  <div class="s-card">
    <div class="s-card-hd">Order Summary</div>
    <div id="s-items"></div>
  </div>
  <div class="s-msg">🙏 Aapka order receive ho gaya!<br>Thodi der mein taiyar ho jaayega.</div>
  <button class="s-newbtn" onclick="resetAll()">+ New Order</button>
</div>

<script>
var PRINTNODE_KEY    = 'DyQsAq9AOczxV7Rz3LuMdOIIsOts8X7o4_8NpEZ7r7M';
var PRINTNODE_ID     = 75568733;
var CAT_ORDER  = ['breakfast','starters','sandwiches','indian','chinese','breads','meals','beverages'];
var CAT_LABELS = {breakfast:'🌅 Breakfast',starters:'🍢 Starters',sandwiches:'🥪 Sandwiches',indian:'🍛 Indian Main',chinese:'🥢 Chinese',breads:'🫓 Breads',meals:'🍱 Meals',beverages:'☕ Beverages'};

var guestName = '', guestPhone = '';
var MENU = [], cart = {}, activeCat = 'all';
var db = null;

// ── FIREBASE ──
try {
  firebase.initializeApp({
    apiKey:"AIzaSyBkgTWZwKcXy5BiCVpppltZWVTW7gIPDbE",
    authDomain:"urban-zayka.firebaseapp.com",
    projectId:"urban-zayka",
    storageBucket:"urban-zayka.firebasestorage.app",
    messagingSenderId:"849575139822",
    appId:"1:849575139822:web:01e6d124f8d78267b196ff"
  });
  db = firebase.firestore();
  loadMenu();
} catch(e) {
  console.warn('Firebase failed:', e);
}

function loadMenu() {
  db.collection('menuItems').get().then(function(snap) {
    if (!snap.empty) {
      MENU = snap.docs.map(function(d) { return Object.assign({}, d.data(), {id:d.id}); });
    } else {
      return db.collection('menu').get().then(function(s2) {
        MENU = s2.docs.map(function(d) { return Object.assign({}, d.data(), {id:d.id}); });
      });
    }
  }).catch(function(e) {
    console.warn('Menu load failed:', e);
  }).then(function() {
    buildTabs();
    renderMenu(null);
  });
}

// ── WELCOME ──
function startOrder() {
  var name  = document.getElementById('w-name').value.trim();
  var phone = document.getElementById('w-phone').value.trim();
  var err   = document.getElementById('w-err');
  err.classList.remove('show');
  if (!name)  { err.textContent='Please enter your name'; err.classList.add('show'); return; }
  if (!phone || phone.length < 10 || !/^\d+$/.test(phone)) { err.textContent='Please enter valid 10-digit mobile number'; err.classList.add('show'); return; }
  guestName  = name;
  guestPhone = phone;
  document.getElementById('m-guest').textContent = name.split(' ')[0];
  goTo('sc-menu');
}

// ── SCREEN NAV ──
function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  var el = document.getElementById(id);
  if (el) { el.classList.add('active'); window.scrollTo(0,0); }
}
function openCart()  { renderCart(); document.getElementById('sc-cart').classList.add('active'); }
function closeCart() { document.getElementById('sc-cart').classList.remove('active'); }
function openSuccess() { document.getElementById('sc-success').classList.add('active'); }

// ── TABS ──
function buildTabs() {
  var cats = ['all'];
  CAT_ORDER.forEach(function(c) {
    if (MENU.some(function(i) { return (i.category||i.cat)===c && !i.soldOut && i.available!==false; })) cats.push(c);
  });
  document.getElementById('m-tabs').innerHTML = cats.map(function(c) {
    return '<button class="m-tab'+(activeCat===c?' active':'')+'" onclick="setTab(\''+c+'\')">'+( c==='all'?'All':(CAT_LABELS[c]||c))+'</button>';
  }).join('');
}
function setTab(cat) { activeCat = cat; buildTabs(); renderMenu(null); document.getElementById('m-body').scrollTop=0; window.scrollTo(0,0); }

// ── MENU RENDER ──
function renderMenu(q) {
  var items = MENU.filter(function(i) {
    var catOk = activeCat==='all' || (i.category||i.cat)===activeCat;
    var avail = !i.soldOut && i.available!==false;
    var qOk   = !q || (i.name||'').toLowerCase().indexOf(q.toLowerCase())>-1;
    return catOk && avail && qOk;
  });
  if (!items.length) {
    document.getElementById('m-body').innerHTML = '<div style="text-align:center;padding:50px;color:#bbb"><div style="font-size:40px;margin-bottom:10px">🔍</div><p>Koi item nahi mila</p></div>';
    return;
  }
  items.sort(function(a,b) {
    var ai=CAT_ORDER.indexOf(a.category||a.cat), bi=CAT_ORDER.indexOf(b.category||b.cat);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  var html = '', lastCat = '';
  items.forEach(function(item) {
    var cat = item.category||item.cat||'';
    if (activeCat==='all' && cat!==lastCat) { html+='<div class="m-sec">'+(CAT_LABELS[cat]||cat)+'</div>'; lastCat=cat; }
    var key = item.id, qty = cart[key]||0;
    var ctrl = qty===0
      ? '<button class="m-add" onclick="addItem(\''+key+'\')">+</button>'
      : '<div class="m-qty"><button onclick="removeItem(\''+key+'\')">&#8722;</button><span>'+qty+'</span><button onclick="addItem(\''+key+'\')">+</button></div>';
    var ph = item.imageUrl
      ? '<div class="m-thumb"><img src="'+item.imageUrl+'" onerror="this.parentNode.textContent=\''+(item.emoji||'🍽️')+'\'"/></div>'
      : '<div class="m-thumb">'+(item.emoji||'🍽️')+'</div>';
    html += '<div class="m-item">'+ph+'<div class="m-iinfo"><div class="m-iname">'+item.name+'</div>'+(item.description||item.desc?'<div class="m-idesc">'+(item.description||item.desc)+'</div>':'')+'<div class="m-iprice">&#8377;'+item.price+'</div></div>'+ctrl+'</div>';
  });
  document.getElementById('m-body').innerHTML = html;
}
function doSearch(q) { renderMenu(q||null); }

// ── CART OPS ──
function addItem(id)    { cart[id]=(cart[id]||0)+1; updateFloat(); renderMenu(null); }
function removeItem(id) { if(cart[id]>1) cart[id]--; else delete cart[id]; updateFloat(); renderMenu(null); }
function cartTotal()    { return Object.keys(cart).reduce(function(s,id){ var i=MENU.find(function(m){return m.id===id;}); return s+(i?i.price*(cart[id]||0):0); },0); }
function cartCount()    { return Object.values(cart).reduce(function(s,q){return s+q;},0); }
function updateFloat() {
  var cnt=cartCount(), fb=document.getElementById('m-float');
  if (cnt>0) { fb.classList.add('vis'); document.getElementById('fl-count').textContent='🛒 '+cnt+(cnt===1?' item':' items'); document.getElementById('fl-total').textContent='&#8377;'+cartTotal(); }
  else fb.classList.remove('vis');
}
function renderCart() {
  var keys = Object.keys(cart);
  var ci = document.getElementById('c-items');
  if (!keys.length) { ci.innerHTML='<div class="c-empty"><div>🛒</div><p>Cart is empty</p></div>'; document.getElementById('c-bill').innerHTML=''; document.getElementById('c-btn-total').textContent='₹0'; return; }
  var html='';
  keys.forEach(function(id) {
    var item=MENU.find(function(m){return m.id===id;}); if(!item) return;
    var qty=cart[id];
    html+='<div class="c-item"><div><div class="c-iname">'+(item.emoji||'')+'  '+item.name+'</div><div class="c-iprice">&#8377;'+item.price+' &#215; '+qty+' = &#8377;'+(item.price*qty)+'</div></div><div class="m-qty"><button onclick="removeItem(\''+id+'\');renderCart()">&#8722;</button><span>'+qty+'</span><button onclick="addItem(\''+id+'\');renderCart()">+</button></div></div>';
  });
  ci.innerHTML = html;
  document.getElementById('c-guest').innerHTML = '<strong>👤 '+guestName+'</strong> &nbsp;|&nbsp; 📱 '+guestPhone;
  var sub=cartTotal();
  document.getElementById('c-bill').innerHTML='<div class="c-brow"><span>Subtotal</span><span>&#8377;'+sub+'</span></div><div class="c-brow"><span>Total</span><span>&#8377;'+sub+'</span></div>';
  document.getElementById('c-btn-total').textContent='₹'+sub;
}

// ── PLACE ORDER ──
function placeOrder() {
  var keys = Object.keys(cart);
  if (!keys.length) { showToast('Pehle kuch items add karein'); return; }
  if (!db) { showToast('❌ Connection error'); return; }
  var sub = cartTotal();
  var refNo = 'UZ'+Date.now().toString().slice(-6);
  var orderItems = [];
  keys.forEach(function(id) {
    var item=MENU.find(function(m){return m.id===id;});
    if (item) orderItems.push({name:item.name,qty:cart[id],price:item.price,total:item.price*cart[id]});
  });
  var btn = document.getElementById('c-btn');
  btn.disabled = true;
  document.getElementById('c-btn-txt').textContent = 'Placing order...';

  var orderData = {
    orderId: refNo,
    customerName: guestName,
    customerPhone: guestPhone,
    orderType: 'dine-in',
    source: 'table-qr',
    items: orderItems,
    subtotal: sub,
    total: sub,
    deliveryCharge: 0,
    status: 'new',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('orders').add(orderData).then(function() {
    printReceipt(refNo, orderItems, sub);
    showSuccessScreen(refNo, orderItems, sub);
  }).catch(function(e) {
    console.error(e);
    orderData.createdAt = new Date();
    db.collection('orders').add(orderData).then(function() {
      printReceipt(refNo, orderItems, sub);
      showSuccessScreen(refNo, orderItems, sub);
    }).catch(function() {
      showToast('❌ Order failed. Please try again.');
      btn.disabled = false;
      document.getElementById('c-btn-txt').textContent = '✅ Place Order';
    });
  });
}

// ── PRINT ──
function printReceipt(refNo, items, total) {
  var line='--------------------------------', dline='================================';
  var pad=function(l,r,w){w=w||32;return l+Array(Math.max(1,w-l.length-r.length+1)).join(' ')+r;};
  var now=new Date();
  var txt='';
  txt+='\x1B\x61\x01';
  txt+='Urban Zayka\n';
  txt+='Met City, Haryana\n';
  txt+='Ph: 8860609555\n';
  txt+='\x1B\x61\x00';
  txt+=dline+'\n';
  txt+='Order: #'+refNo+'\n';
  txt+='Date : '+now.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+'\n';
  txt+='Type : Dine-In (QR Order)\n';
  txt+='Name : '+guestName+'\n';
  txt+='Phone: '+guestPhone+'\n';
  txt+=line+'\n'+pad('ITEM','AMT')+'\n'+line+'\n';
  items.forEach(function(i){
    var nq=i.name+' x'+i.qty, pr='Rs.'+i.total;
    txt+=(nq.length+pr.length>=31)?nq.substring(0,32)+'\n'+pad('',pr)+'\n':pad(nq,pr)+'\n';
  });
  txt+=line+'\n'+dline+'\n'+pad('TOTAL','Rs.'+total)+'\n'+dline+'\n';
  txt+='\x1B\x61\x01';
  txt+='\nThank you!\nurbanzayka.in\n';
  txt+='\x1D\x56\x41\x05\n\n\n';
  var bytes=new TextEncoder().encode(txt);
  var b64=btoa(String.fromCharCode.apply(null,Array.from(bytes)));
  fetch('https://api.printnode.com/printjobs',{
    method:'POST',
    headers:{'Authorization':'Basic '+btoa(PRINTNODE_KEY+':'),'Content-Type':'application/json'},
    body:JSON.stringify({printerId:PRINTNODE_ID,title:'Order #'+refNo,contentType:'raw_base64',content:b64,source:'Urban Zayka QR Order'})
  }).then(function(r){if(r.ok) console.log('Print sent'); else console.warn('Print fail',r.status);}).catch(function(e){console.warn('Print error',e);});
}

// ── SUCCESS ──
function showSuccessScreen(refNo, items, total) {
  document.getElementById('s-ref').textContent = 'Order #'+refNo;
  var html='';
  items.forEach(function(i){ html+='<div class="s-row"><span>'+i.name+' &#215;'+i.qty+'</span><span>&#8377;'+i.total+'</span></div>'; });
  html+='<div class="s-row"><span>Total</span><span>&#8377;'+total+'</span></div>';
  document.getElementById('s-items').innerHTML = html;
  document.getElementById('sc-cart').classList.remove('active');
  openSuccess();
}

function resetAll() {
  cart={};
  guestName=''; guestPhone='';
  activeCat='all';
  document.getElementById('w-name').value='';
  document.getElementById('w-phone').value='';
  document.getElementById('sc-success').classList.remove('active');
  goTo('sc-welcome');
}

// ── TOAST ──
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

// Enter keys
document.getElementById('w-name').addEventListener('keydown',function(e){if(e.key==='Enter') document.getElementById('w-phone').focus();});
document.getElementById('w-phone').addEventListener('keydown',function(e){if(e.key==='Enter') startOrder();});
</script>
